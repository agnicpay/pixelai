name: DreamtCards
options:
  bundleIdPrefix: cards.dreamt
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"
    PRODUCT_BUNDLE_IDENTIFIER: cards.dreamt.app

targets:
  DreamtCards:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - DreamtCards
    info:
      path: DreamtCards/Info.plist
      properties:
        CFBundleDisplayName: Dreamt
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: cards.dreamt.app
            CFBundleURLSchemes:
              - dreamtcards
        NSPhotoLibraryAddUsageDescription: "Save your generated images to Photos."
